<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orders & Customers — Production Tracker</title>
<style>
  :root{
    --green:#024638; --green-2:#036350; --green-3:#012b23;
    --gold:#c5a572; --gold-2:#d6bc91;
    --bg:#f5f6fa; --surface:#fff;
    --ink:#1a1f36; --ink-2:#3d4159; --muted:#6b7088;
    --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#3b82f6;
    --border:#e2e5f0; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  /* ── Header ── */
  .hdr{background:var(--green);padding:32px 40px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .hdr-left .brand{color:var(--gold);font-size:11px;letter-spacing:.32em;text-transform:uppercase;margin-bottom:6px;}
  .hdr-left h1{color:#fff;font-size:28px;font-weight:600;}
  .hdr-left p{color:rgba(255,255,255,.55);font-size:13px;margin-top:4px;}
  .ring{flex-shrink:0;width:90px;height:90px;border-radius:50%;border:3px solid rgba(197,165,114,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(197,165,114,.08);}
  .ring-pct{font-size:26px;font-weight:700;color:var(--gold);line-height:1;}
  .ring-lbl{font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:2px;}

  /* ── Progress strip ── */
  .strip{background:var(--green-3);padding:0 40px;display:flex;align-items:center;gap:16px;height:40px;}
  .bar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:99px;transition:width .6s ease;}
  .strip-lbl{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;}

  /* ── Legend ── */
  .legend{display:flex;gap:20px;padding:14px 40px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dot-done{background:var(--success);}
  .dot-in{background:var(--warning);}
  .dot-todo{background:var(--border);border:1px solid #ccc;}
  .dot-bug{background:var(--danger);}
  .reset-btn{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .15s;}
  .reset-btn:hover{color:var(--ink);border-color:#aaa;}

  /* ── Content ── */
  .content{padding:28px 40px;display:flex;flex-direction:column;gap:20px;max-width:1200px;}

  /* ── Phase block ── */
  .phase{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .phase-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);background:#fafbfc;cursor:pointer;user-select:none;}
  .phase-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
  .phase-info{flex:1;min-width:0;}
  .phase-title{font-size:15px;font-weight:700;}
  .phase-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .phase-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .phase-count{font-size:12px;color:var(--muted);white-space:nowrap;}
  .phase-pbar{width:120px;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
  .phase-pbar-fill{height:100%;border-radius:99px;transition:width .4s ease;}
  .phase-toggle{color:var(--muted);font-size:14px;transition:transform .2s;}
  .phase.collapsed .phase-toggle{transform:rotate(-90deg);}
  .phase-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px;}
  .phase.collapsed .phase-body{display:none;}

  /* ── Task row ── */
  .task{
    display:flex;align-items:flex-start;gap:12px;
    padding:12px 14px;border-radius:8px;border:1px solid transparent;
    transition:background .15s,border-color .15s;
    cursor:pointer;
  }
  .task:hover{background:var(--bg);}
  .task.done{background:#f0fdf4;border-color:#d1fae5;}
  .task.in-progress{background:#fffbeb;border-color:#fde68a;}
  .task.blocked{background:#fef2f2;border-color:#fecaca;}
  .task-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;}
  .task.done .task-cb{background:var(--success);border-color:var(--success);color:#fff;}
  .task.in-progress .task-cb{background:var(--warning);border-color:var(--warning);}
  .task-cb svg{display:none;}
  .task.done .task-cb svg{display:block;}
  .task-right{flex:1;min-width:0;}
  .task-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .task-title{font-size:14px;font-weight:600;color:var(--ink);}
  .task.done .task-title{color:var(--muted);text-decoration:line-through;}
  .task-title-text{flex:1;min-width:0;}
  .task-body{font-size:13px;color:var(--ink-2);margin-top:4px;line-height:1.6;}
  .task-body code{background:rgba(0,0,0,.05);padding:1px 4px;border-radius:3px;font-family:ui-monospace,monospace;font-size:12px;}

  /* ── Badges ── */
  .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:5px;white-space:nowrap;}
  .badge-critical{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
  .badge-high{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
  .badge-medium{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
  .badge-low{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
  .badge-be{background:#1e3a5f;color:#93c5fd;}
  .badge-fe{background:#3b2d6a;color:#c4b5fd;}
  .badge-db{background:#1a3a2e;color:#6ee7b7;}
  .badge-ux{background:#4a2000;color:#fcd34d;}

  /* ── Status toggle ── */
  .status-sel{
    font-size:10px;font-weight:700;letter-spacing:.04em;
    padding:2px 7px;border-radius:5px;border:none;cursor:pointer;
    background:var(--border);color:var(--muted);
    appearance:none;outline:none;
    transition:all .15s;
  }
  .status-todo .status-sel{background:#e5e7eb;color:#6b7280;}
  .status-in .status-sel{background:#fde68a;color:#92400e;}
  .status-done .status-sel{background:#d1fae5;color:#065f46;}
  .status-blocked .status-sel{background:#fecaca;color:#991b1b;}

  /* ── Phase summary cards ── */
  .phase-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin:0 40px 24px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.03);}
  .pc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;}
  .pc-count{font-size:22px;font-weight:800;}
  .pc-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .pc-bar{height:4px;background:var(--border);border-radius:99px;margin-top:8px;overflow:hidden;}
  .pc-bar-fill{height:100%;border-radius:99px;transition:width .5s ease;}

  @media(max-width:700px){
    .hdr{padding:20px;}.strip{padding:0 20px;}.legend{padding:12px 20px;}
    .content{padding:16px 12px;}.phase-cards{margin:0 12px 16px;grid-template-columns:1fr 1fr;}
    .ring{display:none;}
  }
</style>
</head>

<div class="hdr">

};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { state = {}; }
  // Merge baseline into state (does not overwrite user edits)
  for (const [k, v] of Object.entries(COMPLETED_BASELINE)) {
    if (!state[k]) state[k] = v;
  }
}
function saveState() {
  localStorage.setItem(KEY, JSON.stringify(state));
}
function getTask(id) { return state[id] || 'todo'; }
function setTask(id, val) { state[id] = val; saveState(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function sevBadge(s) {
  const map = { critical:'badge-critical', high:'badge-high', medium:'badge-medium', low:'badge-low' };
  return `<span class="badge ${map[s] || 'badge-low'}">${s}</span>`;
}
function layerBadge(l) {
  const map = { be:'badge-be', fe:'badge-fe', db:'badge-db', ux:'badge-ux' };
  const label = { be:'Backend', fe:'Frontend', db:'DB', ux:'UX' };
  return `<span class="badge ${map[l] || ''}">${label[l] || l}</span>`;
}

function statusClass(s) {
  if (s === 'done') return 'done';
  if (s === 'in-progress') return 'in-progress';
  if (s === 'blocked') return 'blocked';
  return '';
}

function renderTask(t) {
  const s = getTask(t.id);
  const isDone = s === 'done';
  const sc = statusClass(s);
  return `
    <div class="task ${sc}" id="task-${t.id}" onclick="cycleTask('${t.id}')">
      <div class="task-cb">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-right">
        <div class="task-head">
          ${sevBadge(t.sev)}
          ${layerBadge(t.layer)}
          <div class="task-title-text task-title">${t.title}</div>
        </div>
        ${t.body ? `<div class="task-body">${t.body}</div>` : ''}
      </div>
    </div>`;
}

function renderPhase(ph) {
  const tasks = ph.tasks;
  const done = tasks.filter(t => getTask(t.id) === 'done').length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
  const isCollapsed = state[`${ph.id}__collapsed`] ? 'collapsed' : '';

  const phaseCard = `
    <div class="phase ${isCollapsed}" id="phase-${ph.id}">
      <div class="phase-head" onclick="togglePhase('${ph.id}')">
        <div class="phase-num" style="background:${ph.color}">${ph.num}</div>
        <div class="phase-info">
          <div class="phase-title">${ph.title}</div>
          <div class="phase-sub">${ph.sub}</div>
        </div>
        <div class="phase-meta">
          <span class="phase-count">${done}/${tasks.length} done</span>
          <div class="phase-pbar">
            <div class="phase-pbar-fill" style="background:${ph.color};width:${pct}%"></div>
          </div>
          <span class="phase-toggle">▾</span>
        </div>
      </div>
      <div class="phase-body">
        ${tasks.map(renderTask).join('')}
      </div>
    </div>`;

  return phaseCard;
}

function renderSummaryCards() {
  const el = document.getElementById('phase-cards');
  el.innerHTML = PHASES.map(ph => {
    const done = ph.tasks.filter(t => getTask(t.id) === 'done').length;
    const total = ph.tasks.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    return `
      <div class="phase-card">
        <div class="pc-title" style="color:${ph.color}">${ph.title.split(' — ')[1] || ph.title}</div>
        <div class="pc-count" style="color:${ph.color}">${done}<span style="color:var(--muted);font-size:14px;font-weight:400"> / ${total}</span></div>
        <div class="pc-sub">${pct}% complete</div>
        <div class="pc-bar"><div class="pc-bar-fill" style="background:${ph.color};width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

function updateProgress() {
  const allTasks = PHASES.flatMap(p => p.tasks);
  const done = allTasks.filter(t => getTask(t.id) === 'done').length;
  const total = allTasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('main-count').textContent = `${done} / ${total} tasks complete`;
  document.getElementById('overall-pct').textContent = pct + '%';
  renderSummaryCards();
}

function render() {
  document.getElementById('main-content').innerHTML = PHASES.map(renderPhase).join('');
  updateProgress();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function cycleTask(id) {
  const cur = getTask(id);
  const next = { todo: 'in-progress', 'in-progress': 'done', done: 'todo' };
  setTask(id, next[cur] || 'todo');
  // Re-render just this task's classes without full re-render
  const el = document.getElementById(`task-${id}`);
  if (!el) return render();
  const s = getTask(id);
  el.className = 'task ' + statusClass(s);
  const cb = el.querySelector('.task-cb');
  const title = el.querySelector('.task-title');
  if (cb) { cb.querySelector('svg').style.display = s === 'done' ? 'block' : 'none'; }
  if (title) { title.style.textDecoration = s === 'done' ? 'line-through' : ''; title.style.color = s === 'done' ? 'var(--muted)' : ''; }
  // Update phase progress bar
  const phase = PHASES.find(p => p.tasks.some(t => t.id === id));
  if (phase) {
    const done = phase.tasks.filter(t => getTask(t.id) === 'done').length;
    const pct = Math.round((done / phase.tasks.length) * 100);
    const phEl = document.getElementById(`phase-${phase.id}`);
    if (phEl) {
      phEl.querySelector('.phase-count').textContent = `${done}/${phase.tasks.length} done`;
      phEl.querySelector('.phase-pbar-fill').style.width = pct + '%';
    }
  }
  updateProgress();
}

function togglePhase(id) {
  const el = document.getElementById(`phase-${id}`);
  const isNowCollapsed = !el.classList.contains('collapsed');
  el.classList.toggle('collapsed', isNowCollapsed);
  state[`${id}__collapsed`] = isNowCollapsed ? '1' : '';
  saveState();
}

function resetAll() {
  if (!confirm('Reset all task progress?')) return;
  state = {};
  saveState();
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
