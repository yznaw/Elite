          {expanded && !isRunning && (
            <div className="feed-detail">
              <div className="feed-detail-grid">
                <div className="stat-cell"><div className="lbl">Run ID</div><div className="v" style={{ fontFamily: 'SF Mono,Menlo,monospace', fontSize: 12 }}>{log.id}</div></div>
                <div className="stat-cell"><div className="lbl">Records Processed</div><div className="v">{log.processed.toLocaleString()}</div></div>
                <div className="stat-cell"><div className="lbl">Records Updated</div><div className="v gold" style={{ fontFamily: 'var(--ff-disp)', fontSize: 16 }}>{log.updated}</div></div>
                <div className="stat-cell"><div className="lbl">Throughput</div><div className="v">{log.processed > 0 ? Math.round(log.processed / (log.durationMs / 1000)).toLocaleString() : 0} rec/s</div></div>
              </div>
              <div className="ms-row" style={{ padding: '10px 0', borderTop: '1px solid var(--border-2)', borderBottom: '1px solid var(--border-2)', margin: '8px 0' }}>
                <span className="muted small">Triggered by</span>
                {log.triggeredBy && log.triggeredBy.type === 'manual' ? (
                  <span className="row gap-sm">
                    <span className="avatar" style={{ width: 22, height: 22, fontSize: 9 }}>{log.triggeredBy.initials}</span>
                    <span className="strong">{log.triggeredBy.user}</span>
                    {log.triggeredBy.context && <span className="muted small">· {log.triggeredBy.context}</span>}

                  <span className="strong">Schedule (automatic)</span>
                )}
              </div>
              {log.err ? (
                <div className="err-block">
                  <div className="strong" style={{ marginBottom: 4 }}>{log.status === 'failed' ? 'Error' : 'Warning'}</div>
                  {log.err}

              <div className="row gap-sm" style={{ marginTop: 10 }}>

              </div>
            </div>
          )}
        </>
      );
    }

    function SyncLogsPage({ pushToast }) {
      const [filter, setFilter] = useState('all');
      const [expandedId, setExpandedId] = useState(null);
      const [logs, setLogs] = useState(SYNC_LOGS);
      const [runningId, setRunningId] = useState(null);
      const [scheduleOpen, setScheduleOpen] = useState(false);
      const [schedAt, setSchedAt] = useState('2026-04-29 14:00');
      const [schedNote, setSchedNote] = useState('');
      const [queued, setQueued] = useState([]);

      const fmtNow = () => {
        const n = new Date();
        const pad = v => String(v).padStart(2, '0');
        return `2026-04-29 ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
      };

      const runManual = (sourceId, context) => {
        const src = SYNC_SOURCES.find(s => s.id === sourceId) || SYNC_SOURCES[0];
        const id = 'L-' + Math.floor(Math.random() * 900 + 200);
        const ts = fmtNow();
        setLogs(prev => [{
          id, ts, type: context ? 'Product Sync' : 'CSV Sync', sourceId,
          processed: 0, updated: 0, status: 'running', durationMs: 0, err: '',
          triggeredBy: { type: 'manual', user: ME.name, initials: ME.initials, context: context || 'Manual sync · Run Now' },
        }, ...prev]);
        setRunningId(id);
        pushToast && pushToast({
          title: 'Sync started',
          sub: `${src.name} · triggered by ${ME.name}`,
          kind: 'info',
        });
        setTimeout(() => {
          const finalProcessed = context ? 1 : Math.floor(Math.random() * 30 + 1220);
          const finalUpdated = context ? 1 : Math.floor(Math.random() * 30 + 5);
          const finalDuration = context ? Math.floor(Math.random() * 400 + 700) : Math.floor(Math.random() * 1500 + 3500);
          setLogs(prev => prev.map(l => l.id === id ? {
            ...l, status: 'success',
            processed: finalProcessed, updated: finalUpdated, durationMs: finalDuration,
          } : l));
          setRunningId(null);
          pushToast && pushToast({
            title: 'Sync complete',
            sub: `${finalProcessed.toLocaleString()} processed · ${finalUpdated} updated`,
            kind: 'success',
          });
        }, 3500);
      };

      const queueScheduled = () => {
        if (!schedAt) return;
        const id = 'Q-' + Math.floor(Math.random() * 900 + 100);
        setQueued(prev => [...prev, { id, at: schedAt, note: schedNote || 'Manual run', by: ME.name, initials: ME.initials }]);
        pushToast && pushToast({ title: 'Manual run scheduled', sub: `${schedAt} · queued by ${ME.name}`, kind: 'info' });
        setSchedNote('');
        setScheduleOpen(false);
      };
      const cancelScheduled = (id) => setQueued(prev => prev.filter(q => q.id !== id));

      const counts = {
        all: logs.length,
        success: logs.filter(l => l.status === 'success').length,
        partial: logs.filter(l => l.status === 'partial').length,
        errors: logs.filter(l => l.status !== 'success' && l.status !== 'running').length,
        manual: logs.filter(l => l.triggeredBy && l.triggeredBy.type === 'manual').length,
        auto: logs.filter(l => l.triggeredBy && l.triggeredBy.type === 'auto').length,
      };

      const filtered = logs.filter(l => {
        if (filter === 'all') return true;
        if (filter === 'errors') return l.status !== 'success' && l.status !== 'running';
        if (filter === 'success') return l.status === 'success';
        if (filter === 'partial') return l.status === 'partial';
        if (filter === 'manual') return l.triggeredBy && l.triggeredBy.type === 'manual';
        if (filter === 'auto') return l.triggeredBy && l.triggeredBy.type === 'auto';
        return true;
      });

      // Group by date
      const grouped = filtered.reduce((acc, log) => {
        const date = log.ts.split(' ')[0];
        (acc[date] = acc[date] || []).push(log);
        return acc;
      }, {});
      const dateKeys = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      // Aggregated stats (last 24h)
      const recordsToday = SYNC_SOURCES.reduce((s, x) => s + x.recordsToday, 0);
      const totalUpdated = SYNC_SOURCES.reduce((s, x) => s + x.updatedToday, 0);
      const avgDuration = (SYNC_SOURCES.reduce((s, x) => s + x.avgMs, 0) / SYNC_SOURCES.length / 1000).toFixed(1);
      const errorCount = logs.filter(l => l.status === 'failed').length;
      const partialCount = logs.filter(l => l.status === 'partial').length;
      const errorRate = ((errorCount / Math.max(logs.length, 1)) * 100).toFixed(1);
      const overallHealth = SYNC_SOURCES.every(s => s.status !== 'failed') ? 'healthy' : 'degraded';

      const dayLabel = (d) => {
        if (d === '2026-04-29') return 'Today · April 29';
        if (d === '2026-04-28') return 'Yesterday · April 28';
        const dt = new Date(d);
        return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      };

      return (
        <div className="page-fade">
          {/* HEALTH BANNER */}
          <div className="health-banner mb-24">
            <div className="row" style={{ justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative', zIndex: 1, gap: 24, flexWrap: 'wrap' }}>
              <div>
                <div className="row gap-sm mb-8">
                  <span className={'live-dot ' + (overallHealth === 'healthy' ? 'green' : 'amber')} />
                  <span style={{ fontSize: 10, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)' }}>System Status</span>
                </div>
                <div style={{ fontFamily: 'var(--ff-disp)', fontSize: 28, fontWeight: 500, marginBottom: 6 }}>
                  {overallHealth === 'healthy' ? 'All systems operational' : 'Sync needs attention'}
                </div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.65)' }}>
                  {recordsToday.toLocaleString()} records synced in the last 24h · {totalUpdated} catalog updates · {partialCount} warning{partialCount === 1 ? '' : 's'} this week
                </div>
              </div>
              <div className="row gap-sm" style={{ alignSelf: 'center' }}>
                <button className="btn" style={{ background: 'rgba(255,255,255,0.1)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)' }}
                  disabled={runningId !== null}
                  onClick={() => runManual('csv')}>
                  {runningId !== null ? <><span className="spin-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 11-6.219-8.56" /></svg></span> Syncing…</> : <>{I.sync} Run Now</>}
                </button>
                <button className="btn btn-gold">Pause Schedule</button>
              </div>
            </div>
          </div>

          {/* SOURCE CARD + SCHEDULE PANEL */}
          <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 20, alignItems: 'stretch' }} className="mb-24 sync-layout">
            {SYNC_SOURCES.map(s => (
              <SyncSourceCard
                key={s.id}
                source={s}
                runningNow={runningId !== null}
                onRunManual={() => runManual(s.id)}
              />
            ))}

            <div className="card" style={{ display: 'flex', flexDirection: 'column' }}>
              <div className="card-header">
                <div>
                  <div className="card-title">Sync Schedule</div>
                  <div className="card-sub">Automated · every 12h · {queued.length} manual queued</div>
                </div>
                <button className={'btn btn-sm ' + (scheduleOpen ? 'btn-primary' : 'btn-gold')} onClick={() => setScheduleOpen(o => !o)}>
                  {scheduleOpen ? 'Cancel' : <>{I.plus} Schedule Manual</>}
                </button>
              </div>

              {scheduleOpen && (
                <div style={{ padding: '14px 20px', background: 'var(--gold-3)', borderBottom: '1px solid var(--border-2)' }}>
                  <div className="row gap-sm" style={{ alignItems: 'flex-end', flexWrap: 'wrap' }}>
                    <div style={{ flex: '1 1 160px' }}>
                      <label className="lbl">Run At</label>
                      <input className="inp" type="datetime-local" defaultValue="2026-04-29T14:00" onChange={e => setSchedAt(e.target.value.replace('T', ' '))} />
                    </div>
                    <div style={{ flex: '2 1 200px' }}>
                      <label className="lbl">Note (optional)</label>
                      <input className="inp" placeholder="e.g. Pre-launch QA sync" value={schedNote} onChange={e => setSchedNote(e.target.value)} />
                    </div>
                    <button className="btn btn-primary" onClick={queueScheduled}>Queue Run</button>
                  </div>
                  <div className="muted small mt-8">Queued runs execute on the system clock and appear in the activity feed with your initials.</div>
                </div>
              )}

              <div className="card-pad" style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
                {queued.length > 0 && (
                  <>
                    <div style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--gold)', fontWeight: 600 }}>Manual Queue · {queued.length}</div>
                    {queued.map(q => (
                      <div key={q.id} style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '10px 12px', background: 'var(--gold-3)', borderRadius: 8, border: '1px solid var(--gold-4)' }}>
                        <div className="avatar" style={{ width: 28, height: 28, fontSize: 10 }}>{q.initials}</div>
                        <div className="grow" style={{ minWidth: 0 }}>
                          <div className="strong" style={{ fontSize: 12 }}>{q.at}</div>
                          <div className="muted small" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{q.note} · by {q.by}</div>
                        </div>
                        <button className="icon-btn" title="Cancel" onClick={() => cancelScheduled(q.id)}>{I.x}</button>
                      </div>
                    ))}
                  </>
                )}

                <div style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--muted)', fontWeight: 600, marginTop: queued.length > 0 ? 6 : 0 }}>Upcoming Auto-runs</div>
                {UPCOMING_RUNS.slice(0, 3).map((r, i) => (
                  <div key={r.ts} style={{ display: 'flex', gap: 14, alignItems: 'center', padding: '8px 0', borderBottom: i < 2 ? '1px solid var(--border-2)' : 'none' }}>
                    <div style={{ width: 30, height: 30, borderRadius: 8, background: i === 0 ? 'var(--gold-3)' : 'var(--bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: i === 0 ? 'var(--gold)' : 'var(--muted)', flexShrink: 0 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>
                    </div>
                    <div className="grow" style={{ minWidth: 0 }}>
                      <div className="strong" style={{ fontSize: 12.5, color: 'var(--ink)' }}>{r.label}</div>
                      <div className="muted small">CSV Sync · Schedule</div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      {i === 0 && <Pill kind="gold">Next</Pill>}
                      <div style={{ marginTop: i === 0 ? 3 : 0, fontFamily: 'SF Mono,Menlo,monospace', fontSize: 10, color: 'var(--muted)' }}>{r.in}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* PERFORMANCE METRICS */}
          <div className="kpi-grid mb-24">
            <KPI label="Records · 24h" value={recordsToday.toLocaleString()} delta="+12.4%" deltaUp={true} icon={I.sync} sparkData={[1980, 2120, 2390, 2580, 2720, 2810, recordsToday]} />
            <KPI label="Avg Duration" value={avgDuration + 's'} delta="-0.4s vs avg" deltaUp={true} icon={I.chart} sparkData={[5.1, 4.9, 4.7, 4.4, 4.3, 4.2, parseFloat(avgDuration)]} />
            <KPI label="Error Rate · 7d" value={errorRate + '%'} delta={partialCount + ' partial'} deltaUp={partialCount === 0} icon={I.bell} sparkData={[0, 0, 0, 1, 0, 0, 0]} />
            <KPI label="Uptime · 30d" value="99.94%" delta="SLA met" deltaUp={true} icon={I.dash} sparkData={[99.9, 99.95, 99.92, 99.98, 99.94, 99.96, 99.94]} />
          </div>

          {/* ACTIVITY FEED */}
          <div className="card">
            <div className="card-header" style={{ flexWrap: 'wrap', gap: 12 }}>
              <div>
                <div className="card-title">Activity Feed</div>
                <div className="card-sub">{filtered.length} of {logs.length} runs · {counts.manual} manual · {counts.auto} scheduled</div>
              </div>
              <div className="row gap-sm" style={{ flexWrap: 'wrap' }}>
                <button className={'chip ' + (filter === 'all' ? 'active' : '')} onClick={() => setFilter('all')}>
                  All <span className="chip-count">{counts.all}</span>
                </button>
                <button className={'chip ' + (filter === 'manual' ? 'active' : '')} onClick={() => setFilter('manual')}>
                  Manual <span className="chip-count">{counts.manual}</span>
                </button>
                <button className={'chip ' + (filter === 'auto' ? 'active' : '')} onClick={() => setFilter('auto')}>
                  Scheduled <span className="chip-count">{counts.auto}</span>
                </button>
                <span style={{ width: 1, height: 18, background: 'var(--border)', alignSelf: 'center' }} />
                <button className={'chip ' + (filter === 'success' ? 'active' : '')} onClick={() => setFilter('success')}>
                  Success <span className="chip-count">{counts.success}</span>
                </button>
                <button className={'chip ' + (filter === 'partial' ? 'active' : '')} onClick={() => setFilter('partial')} style={filter === 'partial' ? { background: 'var(--warning)', borderColor: 'var(--warning)' } : {}}>
                  Warnings <span className="chip-count">{counts.partial}</span>
                </button>
                <button className={'chip ' + (filter === 'errors' ? 'active' : '')} onClick={() => setFilter('errors')} style={filter === 'errors' ? { background: 'var(--danger)', borderColor: 'var(--danger)' } : {}}>
                  Errors <span className="chip-count">{counts.errors}</span>
                </button>
                <button className="btn btn-outline btn-sm" style={{ marginLeft: 8 }}>Download</button>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="card-pad center muted" style={{ padding: '60px 20px' }}>
                <div style={{ fontFamily: 'var(--ff-disp)', fontSize: 24, color: 'var(--muted)', marginBottom: 8 }}>No matching runs</div>
                <div className="small">Try a different filter to see more activity.</div>
              </div>
            ) : (
              <div>
                {dateKeys.map(date => (
                  <div key={date}>
                    <div className="feed-day">
                      <span>{dayLabel(date)}</span>
                      <span className="muted" style={{ marginLeft: 10, fontWeight: 400, letterSpacing: '0.06em' }}>· {grouped[date].length} runs</span>
                    </div>
                    {grouped[date].map(log => (
                      <SyncFeedRow
                        key={log.id}
                        log={log}
                        expanded={expandedId === log.id}
                        onToggle={() => setExpandedId(expandedId === log.id ? null : log.id)}
                      />
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function SettingsPage() {
      const [tab, setTab] = useState('general');
      const [team, setTeam] = useState(TEAM);
      const [inviteForm, setInviteForm] = useState({ name: '', email: '', role: 'Manager' });

      const updateRole = (id, role) => setTeam(t => t.map(m => m.id === id ? { ...m, role } : m));
      const removeMember = id => setTeam(t => t.filter(m => m.id !== id));
      const invite = () => {
        if (!inviteForm.name || !inviteForm.email) return;
        setTeam(t => [...t, {
          id: 'T-' + (t.length + 1),
          name: inviteForm.name,
          email: inviteForm.email,
          role: inviteForm.role,
          joined: '2026-04-29',
          initials: inviteForm.name.split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase(),
        }]);
        setInviteForm({ name: '', email: '', role: 'Manager' });
      };

      return (
        <div className="page-fade">
          <div className="tabs">
            {[['general', 'General'], ['team', 'Team Members'], ['integrations', 'Integrations']].map(([k, l]) => (
              <button key={k} className={'tab ' + (tab === k ? 'active' : '')} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>

          {tab === 'general' && (
            <div className="card card-pad" style={{ maxWidth: 680 }}>
              <div className="card-title mb-16">Store Information</div>
              <div className="grid-2">
                <div>
                  <label className="lbl">Store Name</label>
                  <input className="inp" defaultValue="Elite Collection" />
                </div>
                <div>
                  <label className="lbl">Currency</label>
                  <select className="inp" defaultValue="QAR">
                    <option>QAR — Qatari Riyal</option>
                    <option>SAR — Saudi Riyal</option>
                    <option>AED — UAE Dirham</option>
                    <option>USD — US Dollar</option>
                  </select>
                </div>
                <div>
                  <label className="lbl">Timezone</label>
                  <select className="inp" defaultValue="Asia/Qatar">
                    <option>Asia/Qatar (GMT+3)</option>
                    <option>Asia/Riyadh (GMT+3)</option>
                    <option>Asia/Dubai (GMT+4)</option>
                    <option>UTC</option>
                  </select>
                </div>
                <div>
                  <label className="lbl">Default Language</label>
                  <select className="inp" defaultValue="en">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                  </select>
                </div>
              </div>

              <div className="mt-24">
                <label className="lbl">Logo</label>
                <div style={{ padding: '18px', border: '1px dashed var(--border)', borderRadius: 10, background: 'var(--bg)', display: 'flex', gap: 14, alignItems: 'center' }}>
                  <div className="avatar lg" style={{ borderRadius: 8, background: 'var(--navy)', color: 'var(--gold)', fontFamily: 'var(--ff-disp)', fontSize: 18 }}>EC</div>
                  <div className="grow">
                    <div className="strong">elite-logo.svg</div>
                    <div className="muted small">SVG · 4 KB · uploaded 2024-06-01</div>
                  </div>
                  <button className="btn btn-outline btn-sm">{I.upload} Replace</button>
                </div>
              </div>

              <div className="row gap-sm mt-24" style={{ justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost">Discard</button>
                <button className="btn btn-primary">Save Changes</button>
              </div>
            </div>
          )}

          {tab === 'team' && (
            <div className="col gap-lg">
              <div className="card card-pad">
                <div className="card-title mb-16">Invite Team Member</div>
                <div className="grid-2 mb-16">
                  <div>
                    <label className="lbl">Full Name</label>
                    <input className="inp" placeholder="Yusuf Hamad" value={inviteForm.name} onChange={e => setInviteForm({ ...inviteForm, name: e.target.value })} />
                  </div>
                  <div>
                    <label className="lbl">Email</label>
                    <input className="inp" placeholder="name@elitecollection.qa" value={inviteForm.email} onChange={e => setInviteForm({ ...inviteForm, email: e.target.value })} />
                  </div>
                </div>
                <div className="row gap-sm">
                  <select className="inp" style={{ width: 'auto' }} value={inviteForm.role} onChange={e => setInviteForm({ ...inviteForm, role: e.target.value })}>
                    <option>Admin</option>
                    <option>Manager</option>
                    <option>Viewer</option>
                  </select>
                  <button className="btn btn-gold" onClick={invite}>Send Invitation</button>
                </div>
              </div>

              <div className="card">
                <div className="card-header">
                  <div>
                    <div className="card-title">Team Members</div>
                    <div className="card-sub">{team.length} members · 1 admin</div>
                  </div>
                </div>
                <SortableTable
                  columns={[
                    {
                      key: 'name', label: 'Name', render: r => (
                        <div className="row gap-sm">
                          <div className="avatar">{r.initials}</div>
                          <div>
                            <div className="strong">{r.name}</div>
                            <div className="muted small">Since {r.joined}</div>
                          </div>
                        </div>
                      )
                    },
                    { key: 'email', label: 'Email' },
                    {
                      key: 'role', label: 'Role', noSort: true, render: r => (
                        <select className="inp" style={{ width: 120, padding: '6px 10px', fontSize: 12 }} value={r.role} onChange={e => updateRole(r.id, e.target.value)}>
                          <option>Admin</option>
                          <option>Manager</option>
                          <option>Viewer</option>
                        </select>
                      )
                    },
                    { key: 'actions', label: '', noSort: true, style: { textAlign: 'right' }, render: r => <button className="btn btn-danger btn-sm" onClick={() => removeMember(r.id)}>{I.trash} Remove</button> },
                  ]}
                  rows={team}
                />
              </div>
            </div>
          )}

          {tab === 'integrations' && (
            <div className="grid-3">
              {INTEGRATIONS.map(itg => (
                <div key={itg.id} className="card card-pad">
                  <div className="row" style={{ justifyContent: 'space-between', marginBottom: 8 }}>
                    <div className="strong" style={{ fontSize: 15, color: 'var(--navy)' }}>{itg.name}</div>
                    <Pill kind={itg.connected ? 'green' : 'grey'}>{itg.connected ? 'Connected' : 'Disconnected'}</Pill>
                  </div>
                  <div className="muted small mb-16">{itg.desc}</div>
                  <div className="muted small mb-16" style={{ padding: '8px 10px', background: 'var(--bg)', borderRadius: 6, fontFamily: 'monospace', fontSize: 11 }}>
                    {itg.meta}
                  </div>
                  {itg.id === 'cp' ? (
                    <>
                      <label className="lbl">CSV URL</label>
                      <input className="inp mb-8" defaultValue="https://cp-pos.elitecollection.qa/api/inventory.csv" />
                      <label className="lbl">Schedule</label>
                      <select className="inp mb-16" defaultValue="12h">
                        <option value="1h">Every hour</option>
                        <option value="6h">Every 6 hours</option>
                        <option value="12h">Every 12 hours</option>
                        <option value="24h">Daily</option>
                      </select>
                      <button className="btn btn-primary" style={{ width: '100%' }}>Save Configuration</button>
                    </>
                  ) : (
                    <button className={'btn ' + (itg.connected ? 'btn-outline' : 'btn-gold')} style={{ width: '100%' }}>
                      {itg.connected ? 'Manage' : 'Connect'}
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ═════════════ APP SHELL ═════════════ */
    function Sidebar({ page, setPage }) {
      return (
        <aside className="sidebar">
          <div className="sidebar-brand">
            <div className="brand-mark">ELITE</div>
            <div className="brand-sub">Admin Portal</div>
          </div>
          <div className="nav-section-label"><span className="label-text">Workspace</span></div>
          <div className="col gap-sm" style={{ position: 'relative', zIndex: 1 }}>
            {NAV.map(n => (
              <button key={n.id} className={'nav-item ' + (page === n.id ? 'active' : '')} onClick={() => setPage(n.id)}>
                {n.icon}
                <div>
                  <span>{n.label}</span>
                  <div className="label-sub">{n.sub}</div>
                </div>
              </button>
            ))}
          </div>
          <div className="sidebar-footer">
            <div className="sidebar-user">
              <div className="avatar">YH</div>
              <div style={{ minWidth: 0 }}>
                <div className="strong" style={{ fontSize: 12, color: '#fff' }}>Yusuf Hamad</div>
                <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>Admin · yusuf@elite…</div>
              </div>
            </div>
          </div>
        </aside>
      );
    }

    function Topbar({ page }) {
      const meta = NAV.find(n => n.id === page) || NAV[0];
      const titles = {
        dashboard: 'Dashboard',
        catalog: 'Product Catalog',
        storefront: 'Storefront Control',
        orders: 'Orders & Fulfillment',
        customers: 'Customer CRM',
        analytics: 'Analytics & Insights',
        sync: 'Sync Logs',
        settings: 'Workspace Settings',
      };
      return (
        <div className="topbar">
          <div>
            <div className="crumb">{meta.label} {meta.sub ? '· ' + meta.sub : ''}</div>
            <h1>{titles[page]}</h1>
          </div>
          <div className="topbar-actions">
            <div className="inp-search" style={{ width: 240, position: 'relative' }}>
              {I.search}
              <input className="inp with-icon" placeholder="Quick search…" />
            </div>
            <button className="icon-btn" title="Notifications" style={{ position: 'relative' }}>
              {I.bell}
              <span style={{ position: 'absolute', top: 6, right: 6, width: 8, height: 8, borderRadius: '50%', background: 'var(--gold)', border: '2px solid #fff' }} />
            </button>
            <div className="avatar">YH</div>
          </div>
        </div>
      );
    }

    function Toast({ toast, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 3500);
        return () => clearTimeout(t);
      }, [toast.id]);
      const dotClass = toast.kind === 'success' ? 'green' : toast.kind === 'error' ? 'red' : 'amber';
      return (
        <div className="toast" role="status">
          <span className={'live-dot ' + dotClass} />
          <div className="grow">
            <div className="toast-title">{toast.title}</div>
            {toast.sub && <div className="toast-sub">{toast.sub}</div>}
          </div>
          <button className="x-btn" style={{ borderColor: 'rgba(255,255,255,0.2)', color: 'rgba(255,255,255,0.7)' }} onClick={onClose}>{I.x}</button>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState('dashboard');
      const [activeProduct, setActiveProduct] = useState(null);
      const [activeOrder, setActiveOrder] = useState(null);
      const [activeCustomer, setActiveCustomer] = useState(null);
      const [toast, setToast] = useState(null);
      const pushToast = (t) => setToast({ ...t, id: Date.now() + Math.random() });

      // Switching pages closes any open overlays
      useEffect(() => {
        setActiveProduct(null);
        setActiveOrder(null);
        setActiveCustomer(null);
      }, [page]);

      return (
        <div className="app">
          <Sidebar page={page} setPage={setPage} />
          <div className="main">
            <Topbar page={page} />
            <div className="scroll-area" key={page}>
              {page === 'dashboard' && <DashboardPage />}
              {page === 'catalog' && <CatalogPage openProduct={setActiveProduct} />}
              {page === 'media' && <MediaLibraryPage pushToast={pushToast} />}
              {page === 'storefront' && <StorefrontPage />}
              {page === 'orders' && <OrdersPage openOrder={setActiveOrder} />}
              {page === 'customers' && <CustomersPage openCustomer={setActiveCustomer} />}
              {page === 'analytics' && <AnalyticsPage />}
              {page === 'sync' && <SyncLogsPage pushToast={pushToast} />}
              {page === 'settings' && <SettingsPage />}
            </div>
          </div>

          {activeProduct && <ProductDrawer product={activeProduct} onClose={() => setActiveProduct(null)} pushToast={pushToast} />}
          {activeOrder && <OrderModal order={activeOrder} onClose={() => setActiveOrder(null)} />}
          {activeCustomer && <CustomerDrawer customer={activeCustomer} onClose={() => setActiveCustomer(null)} />}
          {toast && <Toast toast={toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
