@if (showShell()) {
  <div
    class="app"
    [class.sidebar-collapsed]="sidebarCollapsed()"
    [style.--sidebar-w]="sidebarCollapsed() ? '68px' : '240px'"
  >
    <ap-sidebar/>
    <div class="main">
      <ap-topbar/>
      <div class="scroll-area" [class.scroll-area--flush-top]="flushTop()">
        <router-outlet/>
      </div>
    </div>
  </div>
  <!-- Bottom nav: self-hides on ≥769px via CSS -->
  <ap-bottom-nav/>
} @else {
  <router-outlet/>
}

<ap-toast/>
<ap-confirm-dialog/>
